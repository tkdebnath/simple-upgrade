name: build-and-test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: uv sync

      - name: Run Black Formatter Check
        run: uv run black --check src/simple_upgrade || true  # Set to true so build doesn't fail yet while you transition

      - name: Run Flake8 Linter
        run: uv run flake8 src/simple_upgrade --count --statistics || true # Set to true so build doesn't fail yet

      - name: Run PyTest
        env:
          PYTHONPATH: src
        run: uv run pytest tests/
